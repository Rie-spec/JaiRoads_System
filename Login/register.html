<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #EFF1F4;
        }

        .box {
            background: #FEFEFE;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #5C5FED;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="box">
<form id="registerForm">
    <h2>Register</h2>

    <p class="error" id="message" aria-live="polite"></p>

    <input type="text" id="username" placeholder="Username" required autocomplete="username"><br><br>
    <input type="email" id="email" placeholder="Email" required autocomplete="email"><br><br>
    <input type="password" id="password" placeholder="Password" required autocomplete="new-password"><br><br>

    <select id="role" required>
        <option value="" disabled selected>Select role</option>
        <option value="engineer">Engineer</option>
        <option value="admin">Admin</option>
    </select>

    <br><br>

    <button type="submit">Register</button>
</form>
</div>

<script type="module" src="register.js"></script>
</body>
</html>
