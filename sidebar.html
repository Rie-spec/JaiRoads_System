<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover-Expand Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar {
            width: 80px; 
            background-color: #ffffff;
            border-radius: 24px;
            padding: 24px 16px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: calc(100vh - 40px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            position: relative;
            z-index: 100;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
        }

        .sidebar:hover {
            width: 260px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08); 
        }

        .sidebar-top, 
        .sidebar-footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .brand-row, 
        .nav-item, 
        .profile-card, 
        .logout-btn {
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .brand-row {
            gap: 16px;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .brand-icon-box {
            background-color: #5d5fef;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-icon-box svg {
            width: 18px;
            height: 18px;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin: 0;
            color: #111827;
        }

        .search-box { 
            background-color: #f8fafc; 
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            padding: 0 16px; 
            height: 40px; 
            margin-bottom: 24px; 
            display: flex;
            align-items: center;
            gap: 12px; 
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .search-box:focus-within {
            background-color: #ffffff;
            border-color: #a5b4fc;
            box-shadow: 0 0 0 4px #eef2ff;
        }

        .search-box .icon-left { 
            width: 16px; 
            height: 16px; 
            color: #94a3b8; 
            flex-shrink: 0; 
            transition: color 0.2s ease;
        }

        .search-box:focus-within .icon-left {
            color: #5d5fef;
        }

        .search-box input { 
            border: none; 
            background: transparent; 
            outline: none; 
            width: 100%; 
            font-size: 13px; 
            color: #1e293b; 
            font-family: 'Inter', sans-serif; 
        }

        .search-box input::placeholder { 
            color: #94a3b8; 
            font-weight: 500; 
        }

        .search-box .icon-right {
            background: transparent;
            border: none;
            padding: 6px;
            margin-right: -4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .search-box .icon-right svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            stroke: none;
        }

        .search-box:focus-within .icon-right {
            color: #000000; 
        }

        .search-box .icon-right:hover {
            color: #5d5fef !important;
            background-color: #e0e7ff;
        }
        
        .sidebar-label {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-left: 8px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-item {
            padding: 12px 15px;
            gap: 15px;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        
        .nav-item.active {
            background-color: #5d5fef;
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(93, 95, 239, 0.2);
        }

        .nav-item:hover:not(.active) {
            background-color: #f8fafc;
            color: #1e293b;
        }

        .sidebar-footer {
            border-top: 1px solid #f1f5f9;
            padding-top: 24px;
            gap: 12px;
        }
        
        .profile-card {
            background-color: #f8fafc;
            padding: 6px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            gap: 12px;
        }

        .profile-avatar {
            background-color: #e0e7ff;
            color: #5d5fef;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            flex-shrink: 0;
        }

        .profile-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .profile-name {
            margin: 0 0 2px 0;
            font-size: 12px;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .profile-role {
            margin: 0;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            padding: 10px 15px;
            gap: 15px;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: color 0.2s, background-color 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            color: #dc2626;
            background-color: #fef2f2;
        }

        .logout-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        
        .brand-name, 
        .sidebar-label, 
        .nav-item span, 
        .search-box input, 
        .search-box .icon-right,
        .profile-text, 
        .logout-btn span {
            opacity: 0; 
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .sidebar:hover .brand-name, 
        .sidebar:hover .sidebar-label, 
        .sidebar:hover .nav-item span, 
        .sidebar:hover .search-box input, 
        .sidebar:hover .search-box .icon-right,
        .sidebar:hover .profile-text, 
        .sidebar:hover .logout-btn span {
            opacity: 1;
            transition-delay: 0.15s; 
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="brand-row">
                <div class="brand-icon-box">
                    <i data-lucide="navigation"></i>
                </div>
                <h1 class="brand-name">JAIROADS</h1>
            </div>
            
            <div class="search-box">
                <i data-lucide="search" class="icon-left"></i>
                <input type="text" id="globalSearch" placeholder="Search projects...">
                <button class="icon-right" type="button">
                    <i data-lucide="filter"></i>
                </button>
            </div>
            
            <p class="sidebar-label">Infrastructure Hub</p>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="MaintenanceProjects.html" class="nav-item active">
                    <i data-lucide="wrench"></i>
                    <span>Maintenance Projects</span>
                </a>
                <a href="WeeklyUpdates.html" class="nav-item">
                    <i data-lucide="calendar"></i>
                    <span>Weekly Updates</span>
                </a>
                <a href="ProjectDocuments.html" class="nav-item">
                    <i data-lucide="file-text"></i>
                    <span>Project Documents</span>
                </a>
                <a href="Roads.html" class="nav-item">
                    <i data-lucide="map"></i>
                    <span>Roads</span>
                </a>
                <a href="Engineer.html" class="nav-item">
                    <i data-lucide="users"></i>
                    <span>Engineers</span>
                </a>
                <a href="LGU.html" class="nav-item">
                    <i data-lucide="building-2"></i>
                    <span>LGUs</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="user-circle"></i>
                    <span>Account</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="profile-card">
                <div class="profile-avatar">JD</div>
                <div class="profile-text">
                    <p class="profile-name">Jairus John Claude...</p>
                    <p class="profile-role">Engineer</p>
                </div>
            </div>
            <button class="logout-btn" type="button">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
